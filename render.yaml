services:
  - type: web
    name: zorvyn-finance-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run db:migrate && npm start
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard manually or use an Env Group
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
